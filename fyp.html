<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirage — Feed</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="js/theme.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>

<body>
  <div class="page-wrap">
    <div class="feed-layout">
      <!-- Main Content Area -->
      <div class="main-feed-area">
        <header class="site-header" style="margin-bottom: 20px;">
          <span class="logo">mirage</span>
          <nav>
            <a href="fyp.html" class="active">Feed</a>
            <a href="room.html">Chat</a>
            <a href="messages.html">Messages</a>
            <a id="profile-link" href="#">Profile</a>
            <a id="settings-link" href="settings.html">Settings</a>
          </nav>
        </header>

        <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
          <h2 style="flex:1; margin: 0; font-size: 1.05rem; color: var(--text-muted);">
            Welcome, <span id="sidebar-username" style="color: var(--primary); font-weight: 700;">…</span>
          </h2>
          <button class="btn btn-primary btn-sm" id="refresh-btn">Refresh Feed</button>
        </div>

        <!-- Posts feed -->
        <div id="posts-container" style="display: flex; flex-direction: column; gap: 12px;">
          <div class="card card-sm" style="text-align:center; color:var(--text-muted);">Loading feed…</div>
        </div>
      </div>

      <!-- Side Column for Trending -->
      <aside class="side-column">
        <div class="card" id="trending-card" style="position: sticky; top: 20px;">
          <h3 style="margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">Trending Now
          </h3>
          <div id="sidebar-trending" style="color: var(--text-muted); font-size: 0.9rem;">
            Loading trending stories…
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- All embedded logic from original fyp.html is preserved below -->
  <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
  <script>
    let server_url = "http://127.0.0.1:5000";
    const token = localStorage.getItem("token");
    const username = localStorage.getItem("user");

    if (!token || !username) {
      window.location.href = "./index.html";
    }

    document.getElementById("sidebar-username").textContent = username;
    document.getElementById("profile-link").href = `./userprofile.html?user=${encodeURIComponent(username)}`;
    document.getElementById("settings-link").href = "./settings.html";

    async function loadSettings() {
      try {
        const r = await fetch("settings.json");
        const d = await r.json();
        if (d.server_url) server_url = d.server_url;
      } catch (e) { }
    }

    function backtochat() { window.location.href = "./room.html"; }

    function sanitize(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      ["script", "iframe", "style", "link", "object", "embed"].forEach(tag => {
        div.querySelectorAll(tag).forEach(el => el.remove());
      });
      div.querySelectorAll("*").forEach(el => {
        [...el.attributes].forEach(attr => {
          if (attr.name.startsWith("on") || (attr.name === "href" && attr.value.toLowerCase().startsWith("javascript:"))) {
            el.removeAttribute(attr.name);
          }
        });
      });
      return div.innerHTML;
    }

    function renderPost(post) {
      const converter = new showdown.Converter({ sanitize: true });
      const sanitizedContent = (post.content || "").replace(/<[^>]*>/g, "");
      const postContent = converter.makeHtml(sanitizedContent);

      const timeAgo = getTimeAgo(new Date(post.created_at));
      const postIdStr = `POST-${post.id}`;

      const el = document.createElement("article");
      el.className = "post-card";
      const authorName = post.author || post.username || "unknown";
      el.innerHTML = `
      <div class="post-meta">
        <a class="post-author" href="userprofile.html?user=${authorName}">@${authorName}</a>
        <span class="post-time">${timeAgo}</span>
      </div>
      <div class="post-content">${sanitize(postContent)}</div>
      <div class="post-footer">
        <button class="vote-btn upvote-btn" data-postid="${post.id}">▲ ${post.upvotes || 0}</button>
        <button class="vote-btn downvote-btn" data-postid="${post.id}">▼ ${post.downvotes || 0}</button>
        <a href="viewpost.html?post_id=${post.id}" class="post-id">${postIdStr}</a>
      </div>
    `;

      el.querySelectorAll(".upvote-btn").forEach(btn => btn.addEventListener("click", () => votePost(post.id, "up", el)));
      el.querySelectorAll(".downvote-btn").forEach(btn => btn.addEventListener("click", () => votePost(post.id, "down", el)));
      return el;
    }

    async function loadFYP() {
      const container = document.getElementById("posts-container");
      const trendingEl = document.getElementById("sidebar-trending");

      try {
        const res = await fetch(`${server_url}/api/fyp`, {
          headers: { Authorization: token }
        });
        const data = await res.json();

        // Render Posts
        const posts = data.posts || [];
        container.innerHTML = "";
        if (posts.length === 0) {
          container.innerHTML = '<div class="card card-sm" style="text-align:center; color:var(--text-muted);">No posts yet. Follow some users!</div>';
        } else {
          posts.forEach(p => container.appendChild(renderPost(p)));
        }

        // Render Trending
        const trends = data.trending_topics || [];
        if (trends.length === 0) {
          trendingEl.textContent = "Nothing trending yet.";
        } else {
          trendingEl.innerHTML = trends.slice(0, 5).map(p =>
            `<div style="margin-bottom: 8px;"><a href="viewpost.html?post_id=${p.id}" style="font-weight:600;">@${p.username}</a><br><small style="color:var(--text-muted);">${(p.content || "").slice(0, 60)}…</small></div>`
          ).join("");
        }

      } catch (err) {
        container.innerHTML = '<div class="card card-sm" style="text-align:center; color:var(--text-muted);">Failed to load feed.</div>';
        trendingEl.textContent = "Unavailable.";
      }
    }

    async function votePost(postId, type, el) {
      try {
        const response = await fetch(`${server_url}/api/vote_post`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: token },
          body: JSON.stringify({ post_id: postId, vote_type: type })
        });

        if (response.ok) {
          const data = await response.json();
          // Update the specific post counters directly in the DOM
          const upBtn = el.querySelector(".upvote-btn");
          const downBtn = el.querySelector(".downvote-btn");

          if (data.upvotes !== undefined) {
            upBtn.textContent = `▲ ${data.upvotes}`;
            downBtn.textContent = `▼ ${data.downvotes}`;
          } else {
            // Fallback optimistic update if server doesn't return full count
            const currentVal = parseInt(el.querySelector(`.${type}vote-btn`).textContent.split(' ')[1]);
            el.querySelector(`.${type}vote-btn`).textContent = `${type === 'up' ? '▲' : '▼'} ${currentVal + 1}`;
          }
        }
      } catch (e) {
        console.error("Voting failed", e);
      }
    }

    function getTimeAgo(date) {
      const diff = Math.floor((new Date() - date) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return date.toLocaleDateString();
    }

    document.getElementById("refresh-btn").addEventListener("click", () => { loadFYP(); });

    loadSettings().then(() => { loadFYP(); });
  </script>
</body>

</html>
