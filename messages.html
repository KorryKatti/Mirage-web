<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirage — Messages</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="js/theme.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>

<body style="overflow: hidden;">
    <div class="page-wrap" style="padding: 16px; height: 100vh; align-items: flex-start;">

        <div style="width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 12px; height: 100%;">

            <header class="site-header">
                <span class="logo">mirage</span>
                <nav>
                    <a href="fyp.html">Feed</a>
                    <a href="room.html">Chat</a>
                    <a href="messages.html" class="active">Messages</a>
                    <a href="settings.html">Settings</a>
                </nav>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-ghost btn-sm" onclick="init()">Refresh</button>
                    <button class="btn btn-primary btn-sm" onclick="openNewMsg()">New Message</button>
                </div>
            </header>

            <div class="messages-layout" style="flex:1; min-height: 0;">

                <!-- Conversation list -->
                <div class="convo-sidebar" id="convo-list">
                    <div style="padding: 8px; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                        Loading…</div>
                </div>

                <!-- Chat area -->
                <div class="chat-area">
                    <div class="chat-top-bar" id="chat-header" style="display:none;">
                        <span id="active-user-name">Conversation</span>
                    </div>
                    <div id="messages-container">
                        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                            Select a conversation to start messaging.
                        </div>
                    </div>
                    <div class="msg-input-bar" id="input-area" style="display: none;">
                        <input type="text" id="msg-input" placeholder="Write a message…" autocomplete="off" />
                        <button class="btn btn-primary" id="send-btn">Send</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        let server_url = 'http://127.0.0.1:5000';
        const token = localStorage.getItem('token');
        const currentUser = localStorage.getItem('user');
        let allMessages = [];
        let conversations = {};
        let activeSender = null;

        if (!token || !currentUser) { window.location.href = 'index.html'; }

        async function loadSettings() {
            try {
                const r = await fetch('settings.json');
                const d = await r.json();
                if (d.server_url) server_url = d.server_url;
            } catch (e) { }
        }

        async function fetchInbox() {
            try {
                const res = await fetch(`${server_url}/api/inbox`, { headers: { Authorization: token } });
                const data = await res.json();
                return data.messages || [];
            } catch (err) { return []; }
        }

        function groupMessages(messages) {
            const groups = {};
            messages.forEach(msg => {
                const partner = msg.sender === currentUser ? msg.recipient : msg.sender;
                if (!groups[partner]) {
                    groups[partner] = { partner, avatar: 'default.png', messages: [], lastMessage: msg };
                }
                if (msg.sender === partner && msg.avatar_url) groups[partner].avatar = msg.avatar_url;
                groups[partner].messages.push(msg);
                if (new Date(msg.created_at) > new Date(groups[partner].lastMessage.created_at)) {
                    groups[partner].lastMessage = msg;
                }
            });
            return groups;
        }

        function renderConvoList() {
            const list = document.getElementById('convo-list');
            list.innerHTML = '';
            const sorted = Object.values(conversations).sort((a, b) =>
                new Date(b.lastMessage.created_at) - new Date(a.lastMessage.created_at)
            );
            if (sorted.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align:center; color: var(--text-muted); font-size: 0.9rem;">No conversations yet.</div>';
                return;
            }
            sorted.forEach(convo => {
                const item = document.createElement('div');
                item.className = `convo-item${activeSender === convo.partner ? ' active' : ''}`;
                item.onclick = () => selectConvo(convo.partner);
                item.innerHTML = `
        <img src="${convo.avatar}" alt="" onerror="this.src='https://i.pinimg.com/736x/b9/e8/db/b9e8db33168a26c9ca697a05ddc80937.jpg'" />
        <div>
          <div class="convo-name">${convo.partner}</div>
          <div class="convo-preview">${(convo.lastMessage.message || '').slice(0, 40)}…</div>
        </div>
      `;
                list.appendChild(item);
            });
        }

        function selectConvo(sender) {
            activeSender = sender;
            renderConvoList();
            document.getElementById('chat-header').style.display = 'block';
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('active-user-name').textContent = sender;
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            const msgs = (conversations[activeSender]?.messages || []).slice()
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            msgs.forEach(msg => {
                const isSent = msg.sender === currentUser;
                const div = document.createElement('div');
                div.className = `message ${isSent ? 'sent' : 'received'}`;
                const pfp = msg.avatar_url || 'https://i.pinimg.com/736x/b9/e8/db/b9e8db33168a26c9ca697a05ddc80937.jpg';
                const ts = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                div.innerHTML = `
        <img src="${pfp}" alt="" />
        <div class="message-body">
          <div class="message-content">${marked.parse(msg.message || '')}</div>
          <div class="message-meta">${ts}</div>
        </div>
      `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeSender) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.textContent = '…';
            try {
                const res = await fetch(`${server_url}/api/send_inbox_message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: token },
                    body: JSON.stringify({ recipient: activeSender, message: text })
                });
                const data = await res.json();
                if (data.message) { input.value = ''; init(); }
            } catch (e) { }
            btn.disabled = false; btn.textContent = 'Send';
        }

        async function deleteMessage(id, event) {
            event.stopPropagation();
            if (!confirm('Delete this message?')) return;
            try {
                await fetch(`${server_url}/api/delete_inbox_message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: token },
                    body: JSON.stringify({ message_id: id })
                });
                init();
            } catch (e) { }
        }

        function openNewMsg() {
            const r = prompt('Enter username:');
            if (r) {
                if (!conversations[r]) {
                    conversations[r] = { partner: r, avatar: 'default.png', messages: [], lastMessage: { message: '', created_at: new Date() } };
                    renderConvoList();
                }
                selectConvo(r);
            }
        }

        async function init() {
            await loadSettings();
            allMessages = await fetchInbox();
            conversations = groupMessages(allMessages);
            renderConvoList();
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('user');
            if (userParam && !activeSender) {
                if (!conversations[userParam]) {
                    conversations[userParam] = { partner: userParam, avatar: 'default.png', messages: [], lastMessage: { message: '', created_at: new Date() } };
                    renderConvoList();
                }
                selectConvo(userParam);
            } else if (activeSender && conversations[activeSender]) {
                renderMessages();
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('msg-input').onkeypress = e => { if (e.key === 'Enter') sendMessage(); };
        init();
    </script>
</body>

</html>
