<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirage — Settings</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="js/theme.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="page-wrap">
        <div class="center-col">

            <header class="site-header">
                <span class="logo">mirage</span>
                <nav>
                    <a href="fyp.html">Feed</a>
                    <a href="room.html">Chat</a>
                    <a href="messages.html">Messages</a>
                    <a href="settings.html" class="active">Settings</a>
                    <a id="profile-link" href="#">Profile</a>
                </nav>
            </header>

            <div class="card">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                    <img id="avatar-preview"
                        src="https://i.pinimg.com/736x/b9/e8/db/b9e8db33168a26c9ca697a05ddc80937.jpg" alt="Avatar"
                        style="width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-light);" />
                    <div>
                        <h2 id="display-username" style="margin-bottom: 2px;">Loading…</h2>
                        <p class="muted" style="margin: 0;">ID: <span id="display-id">—</span></p>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Account</h3>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Update email address" />
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="password" placeholder="Leave blank to keep current" />
                    </div>
                </div>

                <hr style="margin: 16px 0;" />

                <div class="settings-section">
                    <h3>Appearance</h3>
                    <div class="input-group">
                        <label>Avatar URL</label>
                        <input type="text" id="avatar_url" placeholder="https://…" oninput="updatePreview()" />
                    </div>
                    <div class="input-group">
                        <label>Profile Background URL</label>
                        <input type="text" id="background_image" placeholder="https://… (jpg/png/gif/webp)" />
                    </div>
                    <div class="input-group">
                        <label>Bio</label>
                        <textarea id="description" rows="3" placeholder="Tell people about yourself…"></textarea>
                    </div>
                    <div class="input-group">
                        <label>Custom CSS</label>
                        <textarea id="custom_css" rows="4"
                            placeholder="/* custom CSS applied to your profile */"></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 8px; align-items: center; flex-wrap: wrap;">
                    <button class="btn btn-primary" id="save-btn">Save Changes</button>
                    <button class="btn btn-ghost btn-sm" id="reset-css-btn">Reset CSS</button>
                    <span id="status-msg" style="font-size: 0.85rem;"></span>
                </div>
            </div>

            <div class="card card-sm" style="text-align: center;">
                <button onclick="logout()" class="btn btn-danger btn-sm">Log Out</button>
            </div>

        </div>
    </div>
    <script>
        let server_url = 'http://127.0.0.1:5000';

        function logout() {
            localStorage.clear();
            window.location.href = './index.html';
        }

        function updatePreview() {
            const url = document.getElementById('avatar_url').value;
            if (url) document.getElementById('avatar-preview').src = url;
        }

        async function loadSettingsJson() {
            try {
                const r = await fetch('settings.json');
                const d = await r.json();
                if (d.server_url) server_url = d.server_url;
            } catch (e) { }
        }

        async function loadCurrentSettings() {
            const username = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            if (!username || !token) { window.location.href = './index.html'; return; }
            document.getElementById('display-username').textContent = username;
            document.getElementById('display-id').textContent = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('profile-link').href = `./userprofile.html?user=${encodeURIComponent(username)}`;
            try {
                const res = await fetch(`${server_url}/api/user/${username}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('avatar_url').value = data.avatar_url || '';
                    document.getElementById('description').value = data.description || '';
                    document.getElementById('background_image').value = data.background_image || '';
                    document.getElementById('custom_css').value = data.custom_css || '';
                    if (data.avatar_url) document.getElementById('avatar-preview').src = data.avatar_url;
                }
            } catch (err) { }
        }

        function sanitizeCSS(css) {
            if (!css) return '';
            return css
                .replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gim, '')
                .replace(/expression\s*\(|behavior\s*:/gim, '')
                .replace(/@import\b/gim, '')
                .replace(/-moz-binding\b/gim, '')
                .replace(/javascript\s*:/gim, '')
                .replace(/@font-face\b/gim, '');
        }

        function validateBgUrl(url) {
            if (!url) return true;
            return ['.jpg', '.jpeg', '.png', '.gif', '.webp'].some(e => url.toLowerCase().endsWith(e));
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            const statusMsg = document.getElementById('status-msg');
            const payload = {};
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const avatar_url = document.getElementById('avatar_url').value.trim();
            const description = document.getElementById('description').value.trim();
            const background_image = document.getElementById('background_image').value.trim();
            let custom_css = document.getElementById('custom_css').value.trim();

            if (background_image && !validateBgUrl(background_image)) {
                statusMsg.textContent = 'Invalid background URL format.';
                statusMsg.className = 'error-text';
                return;
            }
            if (custom_css) custom_css = sanitizeCSS(custom_css);
            if (email) payload.email = email;
            if (password) payload.password = password;
            if (avatar_url) payload.avatar_url = avatar_url;
            if (description) payload.description = description;
            if (background_image) payload.background_image = background_image;
            if (custom_css) payload.custom_css = custom_css;

            if (Object.keys(payload).length === 0) {
                statusMsg.textContent = 'No changes to save.';
                statusMsg.style.color = 'var(--text-muted)';
                return;
            }

            try {
                statusMsg.textContent = 'Saving…';
                statusMsg.style.color = 'var(--text-muted)';
                const res = await fetch(`${server_url}/api/user/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: token },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    statusMsg.textContent = 'Saved!';
                    statusMsg.style.color = '#00a050';
                    if (avatar_url) updatePreview();
                } else {
                    const d = await res.json();
                    statusMsg.textContent = d.message || 'Failed to save.';
                    statusMsg.style.color = '#c00';
                }
            } catch (err) {
                statusMsg.textContent = 'Cannot connect to server.';
                statusMsg.style.color = '#c00';
            }
        });

        document.getElementById('reset-css-btn').addEventListener('click', async () => {
            if (!confirm('Reset custom CSS?')) return;
            const token = localStorage.getItem('token');
            const statusMsg = document.getElementById('status-msg');
            try {
                statusMsg.textContent = 'Resetting…';
                const res = await fetch(`${server_url}/api/user/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: token },
                    body: JSON.stringify({ custom_css: '' })
                });
                if (res.ok) {
                    document.getElementById('custom_css').value = '';
                    statusMsg.textContent = 'CSS reset.';
                    statusMsg.style.color = '#00a050';
                }
            } catch (err) {
                statusMsg.textContent = 'Failed.';
                statusMsg.style.color = '#c00';
            }
        });

        loadSettingsJson().then(loadCurrentSettings);
    </script>
</body>

</html>
