<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirage — Post Archive</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="js/theme.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="page-wrap">
    <div class="center-col">

      <header class="site-header">
        <span class="logo">mirage</span>
        <nav>
          <a href="fyp.html">Feed</a>
          <a href="room.html">Chat</a>
          <a href="messages.html">Messages</a>
          <a href="settings.html">Settings</a>
        </nav>
      </header>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
          <div>
            <h1 style="font-size: 1.2rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
              Post Archive</h1>
            <h2 id="article-title" style="margin: 4px 0;">Post #<span id="post-id">---</span></h2>
            <p class="muted" style="margin: 0;">Authored by <span id="post-author"
                style="color: var(--primary); font-weight: 700;">---</span> on <span id="publish-date">---</span></p>
            <p class="muted" style="font-size: 0.75rem;">REF ID: <span id="doi-id">---</span></p>
          </div>
          <div style="display: flex; gap: 8px;">
            <div class="vote-btn" id="cite-up"
              style="display: flex; flex-direction: column; align-items: center; min-width: 60px; padding: 8px; cursor: pointer; border: 1px solid var(--border); border-radius: var(--radius-sm);">
              <span style="font-size: 1.2rem;">▲</span>
              <span id="upvote-count" style="font-weight: 800;">0</span>
            </div>
            <div class="vote-btn" id="cite-down"
              style="display: flex; flex-direction: column; align-items: center; min-width: 60px; padding: 8px; cursor: pointer; border: 1px solid var(--border); border-radius: var(--radius-sm);">
              <span style="font-size: 1.2rem;">▼</span>
              <span id="downvote-count" style="font-weight: 800;">0</span>
            </div>
          </div>
        </div>

        <hr style="margin-bottom: 20px;" />

        <article id="post-container" class="post-content" style="font-size: 1.05rem; line-height: 1.7;">
          Loading post content...
        </article>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
          <span>💬</span> Comments
        </h3>
        <div id="replies-container" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
          <p class="muted">Loading comments...</p>
        </div>

        <hr style="margin-bottom: 20px;" />

        <div class="settings-section">
          <h3>Post a Comment</h3>
          <div class="input-group">
            <textarea id="reply-content" rows="4" placeholder="Write your thoughts... Markdown supported."
              maxlength="512"></textarea>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="muted" id="char-count" style="font-size: 0.75rem;">CHARS: 0/512</span>
            <button class="btn btn-primary btn-sm" id="reply-btn">Publish Comment</button>
          </div>
        </div>
      </div>

      <footer class="card card-sm" style="text-align: center;">
        <p class="muted">
          <a href="fyp.html">← Back to Feed</a> |
          <a href="room.html">Chatroom</a> |
          <a href="settings.html">Settings</a>
        </p>
      </footer>

    </div>
  </div>

  <script>
    let server_url = 'http://127.0.0.1:5000';

    function sanitizeHTML(input) {
      const html = marked.parse(input || '');
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;

      const forbiddenTags = ['script', 'iframe', 'frame', 'object', 'embed', 'link', 'style'];
      forbiddenTags.forEach(tag => {
        const elements = tempDiv.getElementsByTagName(tag);
        while (elements[0]) { elements[0].parentNode.removeChild(elements[0]); }
      });

      const allElements = tempDiv.getElementsByTagName('*');
      for (let el of allElements) {
        const attrs = el.attributes;
        for (let i = attrs.length - 1; i >= 0; i--) {
          const attr = attrs[i];
          if (attr.name.startsWith('on') || (attr.name.toLowerCase() === 'href' && attr.value.toLowerCase().startsWith('javascript:'))) {
            el.removeAttribute(attr.name);
          }
        }
      }

      const allowedTags = ['a', 'abbr', 'acronym', 'b', 'blockquote', 'code', 'em', 'i', 'li', 'ol', 'strong', 'ul', 'p', 'br', 'img', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'pre', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'hr'];
      const allNodes = tempDiv.getElementsByTagName('*');
      for (let i = allNodes.length - 1; i >= 0; i--) {
        const el = allNodes[i];
        if (!allowedTags.includes(el.tagName.toLowerCase())) {
          const parent = el.parentNode;
          while (el.firstChild) { parent.insertBefore(el.firstChild, el); }
          parent.removeChild(el);
        }
      }

      const allowedAttributes = {
        'a': ['href', 'title', 'target'],
        'img': ['src', 'alt', 'title', 'width', 'height'],
        'th': ['align'],
        'td': ['align']
      };

      const allElementsFinal = tempDiv.getElementsByTagName('*');
      for (let el of allElementsFinal) {
        const tagName = el.tagName.toLowerCase();
        if (allowedAttributes[tagName]) {
          const attrs = el.attributes;
          for (let i = attrs.length - 1; i >= 0; i--) {
            const attr = attrs[i];
            if (!allowedAttributes[tagName].includes(attr.name.toLowerCase())) { el.removeAttribute(attr.name); }
          }
        } else {
          const attrs = el.attributes;
          for (let i = attrs.length - 1; i >= 0; i--) { el.removeAttribute(attrs[i].name); }
        }
      }
      return tempDiv.innerHTML;
    }

    async function loadSettings() {
      try {
        const settingsRes = await fetch('settings.json');
        if (settingsRes.ok) {
          const settings = await settingsRes.json();
          if (settings.server_url) server_url = settings.server_url;
        }
      } catch (e) { }
    }

    async function fetchPost(postId) {
      const res = await fetch(`${server_url}/api/get_post_by_id/${postId}`);
      if (!res.ok) throw new Error('Failed to fetch post');
      return res.json();
    }

    function renderPost(postData) {
      document.getElementById('post-id').textContent = postData.id;
      document.getElementById('doi-id').textContent = String(postData.id).padStart(6, '0');
      document.getElementById('post-author').textContent = `@${postData.username}`;
      document.getElementById('publish-date').textContent = new Date(postData.created_at).toLocaleDateString(undefined, {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      document.getElementById('upvote-count').textContent = postData.upvotes || 0;
      document.getElementById('downvote-count').textContent = postData.downvotes || 0;

      const postContainer = document.getElementById('post-container');
      postContainer.innerHTML = sanitizeHTML(postData.content);

      const currentUser = localStorage.getItem('user');
      const isOwnPost = postData.username === currentUser;
      ['cite-up', 'cite-down'].forEach(id => {
        const box = document.getElementById(id);
        if (isOwnPost) {
          box.style.opacity = '0.5';
          box.style.cursor = 'not-allowed';
          box.onclick = null;
        } else {
          box.style.opacity = '1';
          box.style.cursor = 'pointer';
          box.onclick = () => votePost(postData.id, id === 'cite-up' ? 'up' : 'down');
        }
      });
    }

    async function fetchReplies(postId) {
      try {
        const res = await fetch(`${server_url}/api/get_replies/${postId}`);
        if (!res.ok) throw new Error('Failed to fetch replies');
        return res.json();
      } catch (err) { return { replies: [] }; }
    }

    function renderReplies(repliesData) {
      const container = document.getElementById('replies-container');
      const replies = repliesData.replies || [];
      if (replies.length === 0) {
        container.innerHTML = '<p class="muted" style="text-align:center; padding: 20px;">No comments yet.</p>';
        return;
      }
      container.innerHTML = replies.map(reply => `
      <article class="card card-sm" style="background: var(--surface-hover);">
        <div style="font-size: 0.85rem; margin-bottom: 6px;">
          <a href="userprofile.html?user=${reply.username}" style="font-weight:700;">@${reply.username}</a> 
          <span class="muted">· ${new Date(reply.created_at).toLocaleDateString()}</span>
        </div>
        <div class="post-content" style="font-size: 0.92rem;">
          ${sanitizeHTML(reply.content)}
        </div>
      </article>
    `).join('');
    }

    async function votePost(postId, voteType) {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = './login.html'; return; }
      try {
        const res = await fetch(`${server_url}/api/vote_post`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: token },
          body: JSON.stringify({ post_id: postId, vote_type: voteType })
        });
        if (res.ok) { renderPost(await fetchPost(postId)); }
      } catch (e) { }
    }

    function setupReplyForm(postId) {
      const replyContent = document.getElementById('reply-content');
      const charCount = document.getElementById('char-count');
      const replyBtn = document.getElementById('reply-btn');
      replyContent.addEventListener('input', () => { charCount.textContent = `CHARS: ${replyContent.value.length}/512`; });
      replyBtn.addEventListener('click', async () => {
        const content = replyContent.value.trim();
        if (!content) return;
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = './login.html'; return; }
        try {
          const res = await fetch(`${server_url}/api/reply_to_post`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: token },
            body: JSON.stringify({ post_id: postId, content: content })
          });
          if (res.ok) {
            replyContent.value = ''; charCount.textContent = 'CHARS: 0/512';
            renderReplies(await fetchReplies(postId));
          }
        } catch (e) { }
      });
    }

    async function initPostView() {
      await loadSettings();
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = './login.html'; return; }

      const postId = new URLSearchParams(window.location.search).get('post_id');
      if (!postId) { document.body.innerHTML = '<p class="error-text">No post ID provided</p>'; return; }

      try {
        const [postData, repliesData] = await Promise.all([fetchPost(postId), fetchReplies(postId)]);
        renderPost(postData);
        renderReplies(repliesData);
        setupReplyForm(postId);
      } catch (err) {
        document.getElementById('post-container').innerHTML = '<p class="error-text">Failed to fetch post data.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', initPostView);
  </script>
</body>

</html>
