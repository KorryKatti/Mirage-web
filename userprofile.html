<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirage — Profile</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="js/theme.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="page-wrap">
    <div class="center-col">

      <header class="site-header">
        <span class="logo">mirage</span>
        <nav>
          <a href="fyp.html" onclick="window.location.href='./fyp.html'; return false;">Feed</a>
          <a href="room.html" onclick="window.location.href='./room.html'; return false;">Chat</a>
          <a href="messages.html">Messages</a>
          <a href="settings.html">Settings</a>
        </nav>
      </header>

      <!-- Profile hero card -->
      <div class="card">
        <div class="profile-hero">
          <img id="avatar" src="https://i.pinimg.com/736x/b9/e8/db/b9e8db33168a26c9ca697a05ddc80937.jpg" alt="Avatar" />
          <h2 id="username">Loading…</h2>
          <p id="description" class="bio">—</p>
          <p class="muted" style="font-size: 0.8rem;">Joined: <span id="created_at">—</span></p>

          <!-- Stats (populated by renderProfile) -->
          <div class="profile-stats" id="profile-stats-placeholder"></div>

          <!-- Actions -->
          <div class="profile-actions" id="follow-section" style="display:none;">
            <button class="btn btn-primary btn-sm" id="follow-btn" style="display:none;">Follow</button>
            <button class="btn btn-ghost btn-sm" id="unfollow-btn" style="display:none;">Unfollow</button>
            <button class="btn btn-ghost btn-sm" id="message-btn">Message</button>
          </div>
        </div>
      </div>

      <!-- Post compose (own profile only) -->
      <div class="card" id="post-form" style="display:none;">
        <h3 style="margin-bottom: 12px;">New Post</h3>
        <div class="input-group">
          <textarea id="post-content" rows="3" placeholder="What's on your mind? Markdown supported."></textarea>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span class="muted" id="char-count">0/512</span>
          <button class="btn btn-primary btn-sm" id="post-btn">Post</button>
        </div>
      </div>

      <!-- Posts list -->
      <div id="posts-container" style="display: flex; flex-direction: column; gap: 12px;">
        <div class="card card-sm" style="text-align:center; color:var(--text-muted);">Loading posts…</div>
      </div>

    </div>
  </div>

  <!-- Followers modal -->
  <div id="followers-modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Followers</h3>
        <button class="modal-close" onclick="closeModal('followers-modal')">×</button>
      </div>
      <div id="followers-list"></div>
    </div>
  </div>

  <!-- Following modal -->
  <div id="following-modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Following</h3>
        <button class="modal-close" onclick="closeModal('following-modal')">×</button>
      </div>
      <div id="following-list"></div>
    </div>
  </div>

  <script>
    let server_url = 'http://127.0.0.1:5000';

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.style.display = 'none'; }));

    function sanitizeHTML(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      ['script', 'iframe', 'style', 'link', 'object', 'embed'].forEach(tag => div.querySelectorAll(tag).forEach(el => el.remove()));
      div.querySelectorAll('*').forEach(el => {
        [...el.attributes].forEach(attr => {
          if (attr.name.startsWith('on') || (attr.name === 'href' && attr.value.toLowerCase().startsWith('javascript:'))) el.removeAttribute(attr.name);
        });
      });
      return div.innerHTML;
    }

    async function loadSettings() {
      try {
        const r = await fetch('settings.json');
        const d = await r.json();
        if (d.server_url) server_url = d.server_url;
      } catch (e) { }
    }

    async function fetchUserProfile(username) {
      const res = await fetch(`${server_url}/api/user/${username}`);
      if (!res.ok) throw new Error('Failed to fetch profile');
      return res.json();
    }

    async function fetchUserPosts(username) {
      try {
        const res = await fetch(`${server_url}/api/get_posts/${username}`);
        const data = await res.json();
        return data;
      } catch (err) { return { posts: [] }; }
    }

    function renderProfile(data) {
      document.getElementById('username').textContent = `@${data.username}`;
      document.getElementById('avatar').src = data.avatar_url || 'https://i.pinimg.com/736x/b9/e8/db/b9e8db33168a26c9ca697a05ddc80937.jpg';
      document.getElementById('description').innerHTML = sanitizeHTML(data.description || 'No bio yet.');
      document.getElementById('created_at').textContent = new Date(data.created_at).toLocaleDateString();

      // Stats
      let statsContainer = document.querySelector('.profile-stats');
      if (!statsContainer) {
        statsContainer = document.createElement('div');
        statsContainer.className = 'profile-stats';
        document.getElementById('profile-stats-placeholder').replaceWith(statsContainer);
      }
      statsContainer.innerHTML = `
      <div class="stat"><span class="stat-value">${data.stats?.posts || 0}</span><span class="stat-label">Posts</span></div>
      <div class="stat" onclick="showFollowers('${data.username}')" style="cursor:pointer;"><span class="stat-value">${data.stats?.followers || 0}</span><span class="stat-label">Followers</span></div>
      <div class="stat" onclick="showFollowing('${data.username}')" style="cursor:pointer;"><span class="stat-value">${data.stats?.following || 0}</span><span class="stat-label">Following</span></div>
      <div class="stat"><span class="stat-value">▲${data.stats?.upvotes || 0}</span><span class="stat-label">Likes</span></div>
    `;

      if (data.background_image) {
        const valid = ['.jpg', '.jpeg', '.png', '.gif', '.webp'].some(e => data.background_image.toLowerCase().endsWith(e));
        if (valid) {
          document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${data.background_image}')`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundAttachment = 'fixed';
        }
      }

      const oldStyle = document.getElementById('custom-user-css');
      if (oldStyle) oldStyle.remove();
      if (data.custom_css) {
        const style = document.createElement('style');
        style.id = 'custom-user-css';
        style.textContent = data.custom_css;
        document.head.appendChild(style);
      }
    }

    function renderPosts(postsData) {
      const container = document.getElementById('posts-container');
      const posts = postsData.posts || [];
      const currentUser = localStorage.getItem('user');
      container.innerHTML = '';
      if (!posts.length) {
        container.innerHTML = '<div class="card card-sm" style="text-align:center; color:var(--text-muted);">No posts yet.</div>';
        return;
      }
      posts.forEach(post => {
        const isOwn = post.username === currentUser;
        const el = document.createElement('article');
        el.className = 'post-card';
        el.setAttribute('data-post-id', post.id);
        el.innerHTML = `
        <div class="post-meta">
          <a class="post-author" href="userprofile.html?user=${post.username}">@${post.username}</a>
          <span class="post-time">${new Date(post.created_at).toLocaleDateString()}</span>
        </div>
        <div class="post-content">${sanitizeHTML(marked.parse(post.content || ''))}</div>
        <div class="post-footer">
          <button class="vote-btn" onclick="votePost(${post.id},'up')" ${isOwn ? 'disabled' : ''}>▲ ${post.upvotes || 0}</button>
          <button class="vote-btn" onclick="votePost(${post.id},'down')" ${isOwn ? 'disabled' : ''}>▼ ${post.downvotes || 0}</button>
          <a href="viewpost.html?post_id=${post.id}" class="post-id">POST-${post.id}</a>
        </div>
      `;
        container.appendChild(el);
      });
    }

    async function votePost(postId, voteType) {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = './index.html'; return; }
      try {
        const res = await fetch(`${server_url}/api/vote_post`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: token },
          body: JSON.stringify({ post_id: postId, vote_type: voteType })
        });
        if (res.ok) {
          const p = new URLSearchParams(window.location.search).get('user');
          const [profile, posts] = await Promise.all([fetchUserProfile(p), fetchUserPosts(p)]);
          renderProfile(profile); renderPosts(posts);
        }
      } catch (e) { }
    }

    function setupPostForm() {
      const postContent = document.getElementById('post-content');
      const charCount = document.getElementById('char-count');
      const postBtn = document.getElementById('post-btn');
      postContent.addEventListener('input', () => { charCount.textContent = `${postContent.value.length}/512`; });
      postBtn.addEventListener('click', async () => {
        const content = postContent.value.trim();
        if (!content) return;
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = './index.html'; return; }
        try {
          const res = await fetch(`${server_url}/api/create_post`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: token },
            body: JSON.stringify({ content })
          });
          if (res.ok) {
            postContent.value = ''; charCount.textContent = '0/512';
            const u = localStorage.getItem('user');
            const [profile, posts] = await Promise.all([fetchUserProfile(u), fetchUserPosts(u)]);
            renderProfile(profile); renderPosts(posts);
          }
        } catch (e) { }
      });
    }

    async function setupFollowButtons(targetUsername) {
      const token = localStorage.getItem('token');
      const followSection = document.getElementById('follow-section');
      const followBtn = document.getElementById('follow-btn');
      const unfollowBtn = document.getElementById('unfollow-btn');
      followSection.style.display = 'flex';

      try {
        const res = await fetch(`${server_url}/api/check_follow?username=${targetUsername}`, { headers: { Authorization: token } });
        if (res.ok) {
          const data = await res.json();
          followBtn.style.display = data.is_following ? 'none' : 'inline-flex';
          unfollowBtn.style.display = data.is_following ? 'inline-flex' : 'none';
        }
      } catch (e) { }

      followBtn.addEventListener('click', async () => {
        try {
          const res = await fetch(`${server_url}/api/follow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: token },
            body: JSON.stringify({ username: targetUsername })
          });
          if (res.ok) {
            followBtn.style.display = 'none'; unfollowBtn.style.display = 'inline-flex';
            renderProfile(await fetchUserProfile(targetUsername));
          }
        } catch (e) { }
      });

      unfollowBtn.addEventListener('click', async () => {
        try {
          const res = await fetch(`${server_url}/api/unfollow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: token },
            body: JSON.stringify({ username: targetUsername })
          });
          if (res.ok) {
            unfollowBtn.style.display = 'none'; followBtn.style.display = 'inline-flex';
            renderProfile(await fetchUserProfile(targetUsername));
          }
        } catch (e) { }
      });
    }

    async function showFollowers(username) {
      openModal('followers-modal');
      try {
        const res = await fetch(`${server_url}/api/get_followers/${username}`);
        const data = await res.json();
        const list = document.getElementById('followers-list');
        if (!data.followers?.length) { list.innerHTML = '<p class="muted">No followers yet.</p>'; return; }
        list.innerHTML = data.followers.map(u => `
        <div style="display:flex; align-items:center; gap:10px; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <img src="${u.avatar_url}" style="width:36px; height:36px; border-radius:50%; object-fit:cover;" />
          <a href="userprofile.html?user=${u.username}">@${u.username}</a>
        </div>
      `).join('');
      } catch (e) { document.getElementById('followers-list').innerHTML = '<p class="error-text">Failed to load.</p>'; }
    }

    async function showFollowing(username) {
      openModal('following-modal');
      try {
        const res = await fetch(`${server_url}/api/get_following/${username}`);
        const data = await res.json();
        const list = document.getElementById('following-list');
        if (!data.following?.length) { list.innerHTML = '<p class="muted">Not following anyone yet.</p>'; return; }
        list.innerHTML = data.following.map(u => `
        <div style="display:flex; align-items:center; gap:10px; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <img src="${u.avatar_url}" style="width:36px; height:36px; border-radius:50%; object-fit:cover;" />
          <a href="userprofile.html?user=${u.username}">@${u.username}</a>
        </div>
      `).join('');
      } catch (e) { document.getElementById('following-list').innerHTML = '<p class="error-text">Failed to load.</p>'; }
    }

    async function initProfile() {
      await loadSettings();
      const currentUsername = localStorage.getItem('user');
      const token = localStorage.getItem('token');
      if (!currentUsername || !token) { window.location.href = './index.html'; return; }

      const profileUsername = new URLSearchParams(window.location.search).get('user');
      if (!profileUsername) { document.body.innerHTML = '<p class="error-text">No username provided.</p>'; return; }

      try {
        const [profileData, postsData] = await Promise.all([fetchUserProfile(profileUsername), fetchUserPosts(profileUsername)]);
        renderProfile(profileData);
        renderPosts(postsData);

        if (currentUsername === profileUsername) {
          document.getElementById('post-form').style.display = 'block';
          setupPostForm();
          const followSection = document.getElementById('follow-section');
          followSection.style.display = 'flex';
          const editBtn = document.createElement('a');
          editBtn.href = 'settings.html';
          editBtn.className = 'btn btn-ghost btn-sm';
          editBtn.textContent = 'Edit Profile';
          followSection.appendChild(editBtn);
          document.getElementById('message-btn').style.display = 'none';
        } else {
          setupFollowButtons(profileUsername);
          document.getElementById('message-btn').onclick = () => {
            window.location.href = `messages.html?user=${encodeURIComponent(profileUsername)}`;
          };
        }
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', initProfile);
  </script>
</body>

</html>
