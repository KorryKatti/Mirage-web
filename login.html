<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirage — Log In</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/mathcaptcha.js" defer></script>
</head>

<body>
    <div class="page-wrap" style="align-items: center; min-height: 100vh;">
        <div class="center-col" style="max-width: 440px;">

            <div style="text-align: center; margin-bottom: 8px;">
                <a href="index.html" style="font-size: 1.6rem; font-weight: 800; color: var(--primary);">mirage</a>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 4px;">Welcome back</h2>
                <p class="muted" style="margin-bottom: 20px;">Log in to your account</p>

                <form method="POST" action="/login" onsubmit="if (validateCaptcha()) { login(); } return false;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="yourusername" autocomplete="username" required />
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                            required />
                    </div>
                    <div class="input-group">
                        <label id="captcha-question">Math Captcha</label>
                        <input type="text" id="captcha-answer" placeholder="Answer" required />
                    </div>
                    <p id="login-error" class="error-text" style="display:none; margin-bottom: 10px;"></p>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
                </form>

                <p class="muted" style="text-align: center; margin-top: 16px; font-size: 0.85rem;">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>
            </div>

        </div>
    </div>
    <script>
        // Auto-login check
        if (localStorage.getItem('token')) {
            window.location.href = './fyp.html';
        }

        let server_url = 'http://127.0.0.1:5000';

        async function loadSettings() {
            try {
                const r = await fetch('settings.json');
                const d = await r.json();
                if (d.server_url) server_url = d.server_url;
            } catch (e) { }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';

            try {
                const res = await fetch(`${server_url}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', username);
                    window.location.href = './fyp.html';
                } else {
                    errEl.textContent = data.error || 'Login failed';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Cannot connect to server.';
                errEl.style.display = 'block';
            }
        }

        loadSettings();
    </script>
</body>

</html>
